# Helm values for upstream descheduler on kind dev cluster.
# Install: helm install descheduler descheduler/descheduler -n kube-system -f values-kind.yaml
# Repo:    helm repo add descheduler https://kubernetes-sigs.github.io/descheduler/

kind: CronJob
schedule: "0 * * * *"

cmdOptions:
  dry-run: true
  v: 3

deschedulerPolicy:
  profiles:
    - name: ambient-code
      pluginConfig:
        - name: DefaultEvictor
          args:
            podProtections:
              defaultDisabled:
                - "PodsWithLocalStorage"
              extraEnabled:
                - "PodsWithPVC"
        - name: RemovePodsViolatingNodeAffinity
          args:
            nodeAffinityType:
              - requiredDuringSchedulingIgnoredDuringExecution
        - name: RemovePodsViolatingNodeTaints
        - name: RemovePodsViolatingInterPodAntiAffinity
        - name: RemovePodsViolatingTopologySpreadConstraint
        - name: RemoveDuplicates
        - name: PodLifeTime
          args:
            maxPodLifeTimeSeconds: 172800
            namespaces:
              exclude:
                - kube-system
        - name: RemoveFailedPods
          args:
            includingInitContainers: true
            minPodLifetimeSeconds: 3600
        - name: RemovePodsHavingTooManyRestarts
          args:
            podRestartThreshold: 100
            includingInitContainers: true
        - name: LowNodeUtilization
          args:
            thresholds:
              cpu: 20
              memory: 20
              pods: 20
            targetThresholds:
              cpu: 50
              memory: 50
              pods: 50
      plugins:
        deschedule:
          enabled:
            - RemovePodsViolatingNodeAffinity
            - RemovePodsViolatingNodeTaints
            - RemovePodsViolatingInterPodAntiAffinity
            - PodLifeTime
            - RemoveFailedPods
            - RemovePodsHavingTooManyRestarts
        balance:
          enabled:
            - RemoveDuplicates
            - RemovePodsViolatingTopologySpreadConstraint
            - LowNodeUtilization
