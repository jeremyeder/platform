# MLflow database credentials for local-dev (CRC/OpenShift Local)
# DO NOT use these credentials in production!
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-db-credentials
  namespace: redhat-ods-applications
  labels:
    app: mlflow
    app.kubernetes.io/name: mlflow
type: Opaque
stringData:
  # Database connection (uses shared PostgreSQL instance)
  # Note: vteam- prefix from kustomization namePrefix
  uri: "postgresql://postgres:postgres123@vteam-postgresql.vteam-dev.svc.cluster.local:5432/mlflow?sslmode=disable"
