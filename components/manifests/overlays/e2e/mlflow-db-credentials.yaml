# MLflow database credentials for e2e testing
# DO NOT use these credentials in production!
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-db-credentials
  namespace: redhat-ods-applications
  labels:
    app: mlflow
    app.kubernetes.io/name: mlflow
type: Opaque
stringData:
  # Database connection (uses shared PostgreSQL instance)
  uri: "postgresql://postgres:postgres123@postgresql.ambient-code.svc.cluster.local:5432/mlflow?sslmode=disable"
