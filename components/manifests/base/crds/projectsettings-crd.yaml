apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: projectsettings.vteam.ambient-code
spec:
  group: vteam.ambient-code
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        x-kubernetes-validations:
        - rule: "self.metadata.name == 'projectsettings'"
          message: "metadata.name must be 'projectsettings' (singleton per namespace)"
        properties:
          spec:
            type: object
            required:
            - groupAccess
            properties:
              groupAccess:
                type: array
                description: "Group access configuration creating RoleBindings"
                items:
                  type: object
                  required:
                  - groupName
                  - role
                  properties:
                    groupName:
                      type: string
                      description: "Name of the group to grant access"
                    role:
                      type: string
                      enum:
                      - "admin"
                      - "edit"
                      - "view"
                      description: "Role to assign to the group (admin/edit/view)"
              runnerSecretsName:
                type: string
                description: "Name of the Kubernetes Secret in this namespace that stores runner configuration key/value pairs"
              repositories:
                type: array
                description: "Git repositories configured for this project"
                items:
                  type: object
                  required:
                  - url
                  properties:
                    url:
                      type: string
                      description: "Repository URL (HTTPS or SSH format)"
                    branch:
                      type: string
                      description: "Optional branch override (defaults to repository's default branch)"
                    provider:
                      type: string
                      enum:
                      - "github"
                      - "gitlab"
                      description: "Git hosting provider (auto-detected from URL if not specified)"
              inactivityTimeoutSeconds:
                type: integer
                minimum: 0
                default: 86400
                description: "Default inactivity timeout for sessions in this project (seconds). 0 disables. Overridden by session-level spec.inactivityTimeout."
              mcpServers:
                type: object
                description: "Default MCP server configuration for sessions in this project. Session-level config takes precedence."
                properties:
                  custom:
                    type: object
                    description: "Map of server name to server configuration applied to all new sessions"
                    additionalProperties:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  disabled:
                    type: array
                    description: "List of default MCP server names to disable for all sessions in this project"
                    items:
                      type: string
          status:
            type: object
            properties:
              groupBindingsCreated:
                type: integer
                minimum: 0
                description: "Number of group RoleBindings successfully created"
              scheduledSessionRBACReady:
                type: boolean
                description: "Whether RBAC for scheduled session triggers is provisioned"
              limitRangeReady:
                type: boolean
                description: "Whether the default LimitRange for CA bin-packing is provisioned"
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: projectsettings
    singular: projectsetting
    kind: ProjectSettings
    shortNames:
    - ps
