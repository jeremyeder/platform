apiVersion: apps/v1
kind: Deployment
metadata:
  name: observability-dashboard
  labels:
    app: observability-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: observability-dashboard
  template:
    metadata:
      labels:
        app: observability-dashboard
    spec:
      containers:
      - name: observability-dashboard
        imagePullPolicy: Always
        image: ghcr.io/ambient-code/observability:latest
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - secretRef:
            name: observability-dashboard-env
            optional: true
        env:
        - name: PORT
          value: "8000"
        - name: DATA_SOURCE
          value: "langfuse"
        - name: SYNC_INTERVAL
          value: "300"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: observability-dashboard-service
  labels:
    app: observability-dashboard
spec:
  selector:
    app: observability-dashboard
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  type: ClusterIP
