apiVersion: v1
kind: LimitRange
metadata:
  name: ambient-default-limits
  labels:
    ambient-code.io/managed: "true"
    app.kubernetes.io/managed-by: ambient-code
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: 250m
      memory: 256Mi
    default:
      cpu: "2"
      memory: 4Gi
